server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend (verys)
    location /api/ {
        proxy_pass ${VERYS_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy OAuth endpoints served directly by the backend
    location /authorize {
        proxy_pass ${VERYS_UPSTREAM}/authorize;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /verification {
        proxy_pass ${VERYS_UPSTREAM}/verification;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history-mode fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
